name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      - name: Run Go tests with coverage
        run: |
          mkdir -p coverage
          go test ./... -coverprofile=coverage/backend.coverprofile

      - name: Run frontend tests with coverage
        working-directory: frontend
        env:
          CI: "1"
        run: npm run test:coverage

      - name: Generate combined coverage
        run: scripts/ci/generate-combined-coverage.sh

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            coverage/
            frontend/coverage/
          if-no-files-found: error

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Build Go
        run: go build ./...

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: docs-site/package-lock.json

      - name: Install docs-site dependencies
        working-directory: docs-site
        run: npm ci --no-audit --no-fund

      - name: Build Docusaurus site
        working-directory: docs-site
        run: npm run build

      - name: Upload documentation artifact
        uses: actions/upload-artifact@v4
        with:
          name: documentation
          path: docs-site/build
          if-no-files-found: error

  deploy-pages:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test, build, docs]
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Download documentation artifact
        uses: actions/download-artifact@v4
        with:
          name: documentation
          path: site

      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage
          path: coverage-dl

      - name: Assemble Pages site
        shell: bash
        run: |
          set -euo pipefail
          # Docusaurus build is already in site/
          # Add coverage data alongside it
          mkdir -p site/coverage/frontend

          cp coverage-dl/coverage/backend.coverprofile site/coverage/
          cp coverage-dl/coverage/combined-coverage.json site/coverage/
          cp coverage-dl/coverage/combined-coverage-summary.md site/coverage/

          if [[ -d coverage-dl/frontend/coverage ]]; then
            cp coverage-dl/frontend/coverage/coverage-summary.json site/coverage/frontend/
            cp coverage-dl/frontend/coverage/lcov.info site/coverage/frontend/
            cp -R coverage-dl/frontend/coverage/lcov-report site/coverage/frontend/
          fi

          touch site/.nojekyll

      - name: Generate coverage dashboard
        shell: bash
        run: |
          python3 -c "
          import json, sys
          from pathlib import Path

          data = json.loads(Path('site/coverage/combined-coverage.json').read_text())
          be = data.get('backend', {})
          fe = data.get('frontend', {})
          co = data.get('combined', {})

          def pct(s): return f'{float(s.get(\"coverage_percent\", 0)):.2f}%'
          def num(s, k): return int(s.get(k, 0))

          html = f'''<!doctype html>
          <html lang=\"en\">
          <head>
            <meta charset=\"utf-8\"><meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">
            <title>Coverage Dashboard</title>
            <style>
              body {{ font-family: system-ui, sans-serif; margin: 2rem; line-height: 1.5; }}
              table {{ border-collapse: collapse; max-width: 48rem; }}
              th, td {{ border: 1px solid #d0d7de; padding: .5rem .75rem; text-align: right; }}
              th:first-child, td:first-child {{ text-align: left; }}
            </style>
          </head>
          <body>
            <h1>Coverage Dashboard</h1>
            <table>
              <thead><tr><th>Scope</th><th>Covered</th><th>Total</th><th>Coverage</th></tr></thead>
              <tbody>
                <tr><td>Backend (Go)</td><td>{num(be,\"covered_statements\")}</td><td>{num(be,\"total_statements\")}</td><td>{pct(be)}</td></tr>
                <tr><td>Frontend (Vitest)</td><td>{num(fe,\"covered_statements\")}</td><td>{num(fe,\"total_statements\")}</td><td>{pct(fe)}</td></tr>
                <tr><td><strong>Combined</strong></td><td><strong>{num(co,\"covered_statements\")}</strong></td><td><strong>{num(co,\"total_statements\")}</strong></td><td><strong>{pct(co)}</strong></td></tr>
              </tbody>
            </table>
            <h2>Artifacts</h2>
            <ul>
              <li><a href=\"combined-coverage.json\">combined-coverage.json</a></li>
              <li><a href=\"combined-coverage-summary.md\">combined-coverage-summary.md</a></li>
              <li><a href=\"backend.coverprofile\">backend.coverprofile</a></li>
              <li><a href=\"frontend/coverage-summary.json\">frontend/coverage-summary.json</a></li>
              <li><a href=\"frontend/lcov-report/index.html\">Frontend LCOV report</a></li>
            </ul>
            <p><a href=\"../\">Back to documentation</a></p>
          </body></html>'''

          Path('site/coverage/index.html').write_text(html)
          "

      - name: Validate site
        run: |
          test -f site/index.html
          test -f site/coverage/combined-coverage.json
          test -f site/coverage/index.html

      - uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
