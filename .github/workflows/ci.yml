name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docs:
    name: Verify and generate documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Verify documentation freshness
        shell: bash
        run: scripts/ci/verify-docs-freshness.sh

      - name: Generate documentation bundle
        shell: bash
        run: scripts/ci/generate-docs-bundle.sh

      - name: Upload documentation artifact
        uses: actions/upload-artifact@v4
        with:
          name: documentation
          path: generated-docs
          if-no-files-found: error

  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      - name: Run Go tests with coverage profile
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p coverage
          go test ./... -coverprofile=coverage/backend.coverprofile

      - name: Run frontend tests with coverage summary
        working-directory: frontend
        env:
          CI: "1"
        run: npm run test:coverage

      - name: Generate combined coverage summary
        shell: bash
        run: scripts/ci/generate-combined-coverage.sh

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            coverage/backend.coverprofile
            coverage/combined-coverage.json
            coverage/combined-coverage-summary.md
            frontend/coverage/coverage-summary.json
            frontend/coverage/lcov.info
            frontend/coverage/lcov-report
          if-no-files-found: error

  build:
    name: Build application
    runs-on: ubuntu-latest
    needs:
      - test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Build Go packages
        run: go build ./...

  pages:
    name: Prepare GitHub Pages artifact
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - docs
      - test
      - build
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download documentation artifact
        uses: actions/download-artifact@v4
        with:
          name: documentation
          path: artifacts/documentation

      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage
          path: artifacts/coverage

      - name: Normalize downloaded artifact layout
        shell: bash
        run: |
          set -euo pipefail

          DOCS_DIR="artifacts/documentation"
          if [[ -d "$DOCS_DIR/generated-docs" ]]; then
            DOCS_DIR="$DOCS_DIR/generated-docs"
          fi
          if [[ ! -f "$DOCS_DIR/README.md" ]]; then
            echo "Documentation artifact does not contain README.md in expected locations."
            find artifacts/documentation -maxdepth 4 -type f | sort
            exit 1
          fi

          COVERAGE_DIR="artifacts/coverage/coverage"
          if [[ ! -f "$COVERAGE_DIR/backend.coverprofile" || ! -f "$COVERAGE_DIR/combined-coverage.json" ]]; then
            COVERAGE_DIR="artifacts/coverage"
          fi
          if [[ ! -f "$COVERAGE_DIR/backend.coverprofile" || ! -f "$COVERAGE_DIR/combined-coverage.json" ]]; then
            echo "Coverage artifact missing backend/combined coverage files."
            find artifacts/coverage -maxdepth 5 -type f | sort
            exit 1
          fi

          FRONTEND_COVERAGE_DIR="artifacts/coverage/frontend/coverage"
          if [[ ! -f "$FRONTEND_COVERAGE_DIR/coverage-summary.json" ]]; then
            FRONTEND_COVERAGE_DIR="$COVERAGE_DIR/frontend/coverage"
          fi
          if [[ ! -f "$FRONTEND_COVERAGE_DIR/coverage-summary.json" ]]; then
            FRONTEND_COVERAGE_DIR="artifacts/coverage/frontend"
          fi
          if [[ ! -f "$FRONTEND_COVERAGE_DIR/coverage-summary.json" ]]; then
            FRONTEND_COVERAGE_DIR="$COVERAGE_DIR/frontend"
          fi
          if [[ ! -f "$FRONTEND_COVERAGE_DIR/coverage-summary.json" ]]; then
            echo "Coverage artifact missing frontend coverage summary."
            find artifacts/coverage -maxdepth 5 -type f | sort
            exit 1
          fi

          {
            echo "DOCS_DIR=$DOCS_DIR"
            echo "COVERAGE_DIR=$COVERAGE_DIR"
            echo "FRONTEND_COVERAGE_DIR=$FRONTEND_COVERAGE_DIR"
          } >> "$GITHUB_ENV"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Assemble GitHub Pages site
        shell: bash
        run: |
          scripts/ci/assemble-pages-site.sh \
            --docs-dir "$DOCS_DIR" \
            --coverage-dir "$COVERAGE_DIR" \
            --frontend-coverage-dir "$FRONTEND_COVERAGE_DIR" \
            --output site

      - name: Validate Pages site structure
        shell: bash
        run: |
          set -euo pipefail
          test -f site/index.html
          test -f site/docs/index.html
          test -f site/coverage/index.html
          test -f site/coverage/combined-coverage.json
          test -f site/coverage/frontend/lcov-report/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy-pages:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - pages
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
