name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: darwin/universal
            artifact: clockify-jira-sync-macos
          - os: windows-latest
            platform: windows/amd64
            artifact: clockify-jira-sync-windows

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Wails CLI
        shell: bash
        run: |
          set -euo pipefail
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build release binary
        shell: bash
        run: |
          set -euo pipefail
          wails build -clean -platform "${{ matrix.platform }}" -v 1

      - name: Package macOS artifact
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          APP_PATH="build/bin/clockify-jira-sync.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "Expected app bundle not found at $APP_PATH"
            ls -la build/bin || true
            exit 1
          fi
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "release-assets/clockify-jira-sync-macos.zip"

      - name: Package Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          if (-not (Test-Path "build/bin")) {
            throw "build/bin not found after Wails build."
          }
          Compress-Archive -Path "build/bin/*" -DestinationPath "release-assets/clockify-jira-sync-windows.zip" -Force

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: release-assets/*
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - build
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
