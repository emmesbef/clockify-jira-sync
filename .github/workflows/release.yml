name: Release

on:
  workflow_call:
    inputs:
      tag_name:
        description: Version tag to build and publish assets for
        required: true
        type: string
      prerelease:
        description: Mark this release as a pre-release (beta)
        required: false
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Version tag (e.g. v1.2.3 or v2.0.0-beta.1)"
        required: true
        type: string
      prerelease:
        description: "Pre-release (beta)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

env:
  APP_NAME: clockify-jira-sync

jobs:
  build:
    name: Build ${{ matrix.asset_id }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: darwin/universal
            asset_id: macos-universal
          - os: windows-latest
            platform: windows/amd64
            asset_id: windows-amd64
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Set app version in wails.json
        shell: bash
        run: |
          VERSION="${{ inputs.tag_name }}"
          VERSION="${VERSION#v}"
          # Update productVersion so the built app bundle (Info.plist) reports
          # the correct version — required for `brew upgrade --cask` to work.
          jq --arg v "$VERSION" '.info.productVersion = $v' wails.json > wails.tmp \
            && mv wails.tmp wails.json

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: |
          VERSION="${{ inputs.tag_name }}"
          VERSION="${VERSION#v}"
          wails build -clean -platform "${{ matrix.platform }}" \
            -ldflags "-X main.version=${VERSION}"
          # Ad-hoc sign with entitlements so right-click → Open works on macOS.
          # Full notarization (which removes the prompt entirely) requires an
          # Apple Developer account.
          codesign --force --deep --sign - \
            --entitlements build/darwin/entitlements.plist \
            --options runtime \
            build/bin/clockify-jira-sync.app
          # Verify the signature is valid
          codesign --verify --verbose build/bin/clockify-jira-sync.app

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${{ inputs.tag_name }}" -replace '^v',''
          wails build -clean -platform "${{ matrix.platform }}" -ldflags "-X main.version=$version"

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          mkdir -p release-assets
          APP_PATH="build/bin/clockify-jira-sync.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "::error::App bundle not found at $APP_PATH"
            ls -la build/bin/ || true
            exit 1
          fi
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" \
            "release-assets/${APP_NAME}-${{ inputs.tag_name }}-${{ matrix.asset_id }}.zip"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          if (-not (Test-Path "build/bin")) {
            throw "build/bin not found after Wails build."
          }
          Compress-Archive -Path "build/bin/*" `
            -DestinationPath "release-assets/$env:APP_NAME-${{ inputs.tag_name }}-${{ matrix.asset_id }}.zip" -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.asset_id }}
          path: release-assets/*.zip
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name }}

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: assets
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd assets
          sha256sum *.zip > "${APP_NAME}-${{ inputs.tag_name }}-SHA256SUMS.txt"

      - name: Save release notes and remove immutable release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          TAG="${{ inputs.tag_name }}"
          # Try to fetch notes from Release Please's existing release
          if gh release view "$TAG" --json body -q .body > /tmp/release-notes.md 2>/dev/null; then
            echo "Saved release notes from existing release"
            # Delete the immutable release (tag is preserved)
            gh release delete "$TAG" --yes
            echo "HAVE_NOTES=true" >> "$GITHUB_ENV"
          else
            echo "No existing release found, will extract from CHANGELOG.md"
            VERSION="${TAG#v}"
            NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md)
            if [ -n "$NOTES" ]; then
              echo "$NOTES" > /tmp/release-notes.md
              echo "HAVE_NOTES=true" >> "$GITHUB_ENV"
            else
              echo "HAVE_NOTES=false" >> "$GITHUB_ENV"
            fi
          fi

      - name: Create release with assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          TAG="${{ inputs.tag_name }}"
          RELEASE_FLAG="--latest"
          if [ "${{ inputs.prerelease }}" = "true" ]; then
            RELEASE_FLAG="--prerelease"
          fi
          if [ "$HAVE_NOTES" = "true" ]; then
            gh release create "$TAG" assets/*.zip assets/*SHA256SUMS.txt \
              --title "$TAG" --notes-file /tmp/release-notes.md $RELEASE_FLAG
          else
            gh release create "$TAG" assets/*.zip assets/*SHA256SUMS.txt \
              --title "$TAG" --generate-notes $RELEASE_FLAG
          fi

  update-homebrew:
    name: Update Homebrew Cask
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [publish]
    if: ${{ inputs.prerelease != true }}
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: release-macos-universal
          path: assets

      - name: Compute SHA256 and update cask via API
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          TAG="${{ inputs.tag_name }}"
          VERSION="${TAG#v}"
          SHA=$(sha256sum assets/*macos-universal.zip | awk '{print $1}')
          echo "Version: $VERSION  SHA256: $SHA"

          CASK_CONTENT=$(cat <<'CASK_EOF'
          cask "clockify-jira-sync" do
            version "VERSION_PLACEHOLDER"
            sha256 "SHA_PLACEHOLDER"

            url "https://github.com/emmesbef/clockify-jira-sync/releases/download/v#{version}/clockify-jira-sync-v#{version}-macos-universal.zip"
            name "Clockify Jira Sync"
            desc "Desktop app to sync Clockify time entries with Jira worklogs"
            homepage "https://emmesbef.github.io/clockify-jira-sync/"

            livecheck do
              url :url
              strategy :github_latest
            end

            app "clockify-jira-sync.app"

            postflight do
              system_command "/usr/bin/xattr",
                             args: ["-cr", "#{appdir}/clockify-jira-sync.app"]
            end

            zap trash: [
              "~/Library/Application Support/clockify-jira-sync",
              "~/Library/Preferences/com.wails.clockify-jira-sync.plist",
            ]
          end
          CASK_EOF
          )

          # Substitute placeholders and strip heredoc indent
          CASK_CONTENT=$(echo "$CASK_CONTENT" \
            | sed "s/VERSION_PLACEHOLDER/${VERSION}/" \
            | sed "s/SHA_PLACEHOLDER/${SHA}/" \
            | sed 's/^          //')

          # Get current file SHA (needed for updates)
          FILE_SHA=$(gh api repos/emmesbef/homebrew-tap/contents/Casks/clockify-jira-sync.rb \
            --jq '.sha' 2>/dev/null || echo "")

          ENCODED=$(echo "$CASK_CONTENT" | base64 -w0)

          if [ -n "$FILE_SHA" ]; then
            gh api --method PUT repos/emmesbef/homebrew-tap/contents/Casks/clockify-jira-sync.rb \
              -f message="chore: bump clockify-jira-sync to ${VERSION}" \
              -f content="$ENCODED" \
              -f sha="$FILE_SHA"
          else
            gh api --method PUT repos/emmesbef/homebrew-tap/contents/Casks/clockify-jira-sync.rb \
              -f message="chore: bump clockify-jira-sync to ${VERSION}" \
              -f content="$ENCODED"
          fi
