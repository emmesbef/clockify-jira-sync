stages:
  - test
  - build
  - docs
  - release
  - deploy

variables:
  APP_NAME: "jirafy-clockwork"

.go_node_job:
  image: golang:1.23-bookworm
  before_script:
    - apt-get update
    - apt-get install -y --no-install-recommends curl xz-utils ca-certificates git zip
    - curl -fsSL https://nodejs.org/dist/v20.19.0/node-v20.19.0-linux-x64.tar.xz -o /tmp/node.tar.xz
    - tar -xJf /tmp/node.tar.xz -C /usr/local --strip-components=1
    - rm -rf /var/lib/apt/lists/*
    - node --version
    - npm --version

test:
  stage: test
  extends: .go_node_job
  rules:
    - if: '$CI_COMMIT_TAG'
      when: never
    - if: '$CI_COMMIT_BRANCH =~ /^release\/v\d+\.\d+\.\d+$/'
      when: never
    - when: on_success
  script:
    - cd frontend && npm ci --no-audit --no-fund && cd ..
    - mkdir -p coverage
    - go test ./... -coverprofile=coverage/backend.coverprofile
    - cd frontend && CI=1 npm run test:coverage && cd ..
    - scripts/ci/generate-combined-coverage.sh
  artifacts:
    when: always
    expire_in: 14 days
    paths:
      - coverage/
      - frontend/coverage/

build:
  stage: build
  extends: .go_node_job
  needs: ["test"]
  rules:
    - if: '$CI_COMMIT_TAG'
      when: never
    - if: '$CI_COMMIT_BRANCH =~ /^release\/v\d+\.\d+\.\d+$/'
      when: never
    - when: on_success
  script:
    - cd frontend && npm ci --no-audit --no-fund && cd ..
    - cd frontend && npm run build && cd ..
    - go build ./...

docs:
  stage: docs
  extends: .go_node_job
  rules:
    - if: '$CI_COMMIT_TAG'
      when: never
    - if: '$CI_COMMIT_BRANCH =~ /^release\/v\d+\.\d+\.\d+$/'
      when: never
    - when: on_success
  script:
    - cd docs-site && npm ci --no-audit --no-fund && cd ..
    - scripts/ci/verify-docs-freshness.sh
    - cd docs-site && npm run build
  artifacts:
    expire_in: 14 days
    paths:
      - docs-site/build/

release_cross_platform:
  stage: release
  extends: .go_node_job
  rules:
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_COMMIT_BRANCH =~ /^release\/v\d+\.\d+\.\d+$/'
  script:
    - |
      set -euo pipefail
      release_tag="${CI_COMMIT_TAG:-}"
      if [[ -z "$release_tag" ]]; then
        if [[ "${CI_COMMIT_BRANCH:-}" =~ ^release/(v[0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
          release_tag="${BASH_REMATCH[1]}"
        else
          echo "Error: release tag not resolved from CI_COMMIT_TAG or release/* branch name." >&2
          exit 1
        fi
      fi
      version="${release_tag#v}"
      echo "RELEASE_TAG=${release_tag}" > release-assets.env

      cd frontend
      npm ci --no-audit --no-fund
      npm run build
      cd ..

      rm -rf release-assets release-work
      mkdir -p release-assets \
        release-work/macos/jirafy-clockwork.app/Contents/MacOS \
        release-work/macos/jirafy-clockwork.app/Contents/Resources \
        release-work/windows

      cp build/bin/jirafy-clockwork.app/Contents/Info.plist \
        release-work/macos/jirafy-clockwork.app/Contents/Info.plist
      cp build/bin/jirafy-clockwork.app/Contents/Resources/iconfile.icns \
        release-work/macos/jirafy-clockwork.app/Contents/Resources/iconfile.icns

      GOOS=darwin GOARCH=amd64 CGO_ENABLED=0 go build \
        -trimpath \
        -ldflags "-X main.version=${version}" \
        -o release-work/macos/jirafy-clockwork.app/Contents/MacOS/jirafy-clockwork-amd64 \
        .
      GOOS=darwin GOARCH=arm64 CGO_ENABLED=0 go build \
        -trimpath \
        -ldflags "-X main.version=${version}" \
        -o release-work/macos/jirafy-clockwork.app/Contents/MacOS/jirafy-clockwork-arm64 \
        .

      cat > release-work/macos/jirafy-clockwork.app/Contents/MacOS/jirafy-clockwork <<'EOF'
      #!/bin/sh
      set -eu
      BIN_DIR="$(CDPATH= cd -- "$(dirname "$0")" && pwd)"
      case "$(uname -m)" in
        arm64|aarch64) exec "${BIN_DIR}/jirafy-clockwork-arm64" "$@" ;;
        x86_64|amd64) exec "${BIN_DIR}/jirafy-clockwork-amd64" "$@" ;;
        *) echo "Unsupported architecture: $(uname -m)" >&2; exit 1 ;;
      esac
      EOF
      chmod +x release-work/macos/jirafy-clockwork.app/Contents/MacOS/jirafy-clockwork*

      (
        cd release-work/macos
        zip -qry "../../release-assets/${APP_NAME}-${release_tag}-macos-universal.zip" "jirafy-clockwork.app"
      )

      GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build \
        -trimpath \
        -ldflags "-X main.version=${version}" \
        -o "release-work/windows/${APP_NAME}.exe" \
        .
      (
        cd release-work/windows
        zip -qj "../../release-assets/${APP_NAME}-${release_tag}-windows-amd64.zip" "${APP_NAME}.exe"
      )
  artifacts:
    expire_in: 14 days
    reports:
      dotenv: release-assets.env
    paths:
      - release-assets/*.zip

release_publish:
  stage: release
  image: alpine:3.20
  needs:
    - job: release_cross_platform
      artifacts: true
  rules:
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_COMMIT_BRANCH =~ /^release\/v\d+\.\d+\.\d+$/'
  before_script:
    - apk add --no-cache bash curl jq coreutils
    - chmod +x scripts/ci/publish-gitlab-release.sh
  script:
    - scripts/ci/publish-gitlab-release.sh
  artifacts:
    expire_in: 14 days
    paths:
      - release-assets/*SHA256SUMS.txt

pages:
  stage: deploy
  image: alpine:3.20
  needs:
    - job: docs
      artifacts: true
    - job: test
      artifacts: true
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  before_script:
    - apk add --no-cache bash python3 coreutils
  script:
    - scripts/ci/assemble-pages-site.sh --docs-dir docs-site/build --coverage-dir coverage --frontend-coverage-dir frontend/coverage --output public
  artifacts:
    paths:
      - public
