stages:
  - test
  - build
  - docs
  - release
  - deploy

variables:
  APP_NAME: "jirafy-clockwork"

.go_node_job:
  image: golang:1.23-bookworm
  before_script:
    - apt-get update
    - apt-get install -y --no-install-recommends curl xz-utils ca-certificates git
    - curl -fsSL https://nodejs.org/dist/v20.19.0/node-v20.19.0-linux-x64.tar.xz -o /tmp/node.tar.xz
    - tar -xJf /tmp/node.tar.xz -C /usr/local --strip-components=1
    - rm -rf /var/lib/apt/lists/*
    - node --version
    - npm --version

test:
  stage: test
  extends: .go_node_job
  rules:
    - if: '$CI_COMMIT_TAG'
      when: never
    - when: on_success
  script:
    - cd frontend && npm ci --no-audit --no-fund && cd ..
    - mkdir -p coverage
    - go test ./... -coverprofile=coverage/backend.coverprofile
    - cd frontend && CI=1 npm run test:coverage && cd ..
    - scripts/ci/generate-combined-coverage.sh
  artifacts:
    when: always
    expire_in: 14 days
    paths:
      - coverage/
      - frontend/coverage/

build:
  stage: build
  extends: .go_node_job
  needs: ["test"]
  rules:
    - if: '$CI_COMMIT_TAG'
      when: never
    - when: on_success
  script:
    - cd frontend && npm ci --no-audit --no-fund && cd ..
    - cd frontend && npm run build && cd ..
    - go build ./...

docs:
  stage: docs
  extends: .go_node_job
  rules:
    - if: '$CI_COMMIT_TAG'
      when: never
    - when: on_success
  script:
    - cd docs-site && npm ci --no-audit --no-fund && cd ..
    - scripts/ci/verify-docs-freshness.sh
    - cd docs-site && npm run build
  artifacts:
    expire_in: 14 days
    paths:
      - docs-site/build/

release_macos:
  stage: release
  tags:
    - macos
  rules:
    - if: '$CI_COMMIT_TAG'
  script:
    - |
      set -euo pipefail
      if ! command -v go >/dev/null 2>&1; then
        echo "Go is required on the macOS runner."
        exit 1
      fi
      if ! command -v npm >/dev/null 2>&1; then
        echo "Node.js/npm is required on the macOS runner."
        exit 1
      fi
      cd frontend
      npm ci --no-audit --no-fund
      cd ..
      go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0
      export PATH="$(go env GOPATH)/bin:$PATH"
      version="${CI_COMMIT_TAG#v}"
      python3 - "$version" <<'PY'
      import json
      import sys
      from pathlib import Path

      version = sys.argv[1]
      path = Path("wails.json")
      data = json.loads(path.read_text(encoding="utf-8"))
      data.setdefault("info", {})["productVersion"] = version
      path.write_text(json.dumps(data, indent=2) + "\n", encoding="utf-8")
      PY
      wails build -clean -platform darwin/universal -ldflags "-X main.version=${version}"
      codesign --force --deep --sign - \
        --entitlements build/darwin/entitlements.plist \
        --options runtime \
        "build/bin/${APP_NAME}.app"
      codesign --verify --verbose "build/bin/${APP_NAME}.app"
      mkdir -p release-assets
      ditto -c -k --sequesterRsrc --keepParent \
        "build/bin/${APP_NAME}.app" \
        "release-assets/${APP_NAME}-${CI_COMMIT_TAG}-macos-universal.zip"
  artifacts:
    expire_in: 14 days
    paths:
      - release-assets/*.zip

release_windows:
  stage: release
  tags:
    - windows
  rules:
    - if: '$CI_COMMIT_TAG'
  script:
    - |
      $ErrorActionPreference = "Stop"
      if (-not (Get-Command go -ErrorAction SilentlyContinue)) {
        throw "Go is required on the Windows runner."
      }
      if (-not (Get-Command npm -ErrorAction SilentlyContinue)) {
        throw "Node.js/npm is required on the Windows runner."
      }
      Set-Location frontend
      npm ci --no-audit --no-fund
      Set-Location ..
      go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0
      $env:Path += ";" + (go env GOPATH) + "\bin"
      $version = $env:CI_COMMIT_TAG -replace "^v",""
      $wails = Get-Content wails.json -Raw | ConvertFrom-Json
      $wails.info.productVersion = $version
      $wails | ConvertTo-Json -Depth 20 | Set-Content wails.json -NoNewline
      Add-Content wails.json "`n"
      wails build -clean -platform windows/amd64 -ldflags "-X main.version=$version"
      New-Item -ItemType Directory -Force -Path release-assets | Out-Null
      Compress-Archive -Path "build/bin/*" -DestinationPath "release-assets/$env:APP_NAME-$env:CI_COMMIT_TAG-windows-amd64.zip" -Force
  artifacts:
    expire_in: 14 days
    paths:
      - release-assets/*.zip

release_publish:
  stage: release
  image: alpine:3.20
  needs:
    - job: release_macos
      artifacts: true
    - job: release_windows
      artifacts: true
  rules:
    - if: '$CI_COMMIT_TAG'
  before_script:
    - apk add --no-cache bash curl jq coreutils
    - chmod +x scripts/ci/publish-gitlab-release.sh
  script:
    - scripts/ci/publish-gitlab-release.sh
  artifacts:
    expire_in: 14 days
    paths:
      - release-assets/*SHA256SUMS.txt

pages:
  stage: deploy
  image: alpine:3.20
  needs:
    - job: docs
      artifacts: true
    - job: test
      artifacts: true
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  before_script:
    - apk add --no-cache bash python3 coreutils
  script:
    - scripts/ci/assemble-pages-site.sh --docs-dir docs-site/build --coverage-dir coverage --frontend-coverage-dir frontend/coverage --output public
  artifacts:
    paths:
      - public
