<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Clockify ↔ Jira Time Sync</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
  <script type="module" crossorigin src="/assets/index.a28de1fe.js"></script>
  <link rel="stylesheet" href="/assets/index.15ce657b.css">
</head>

<body>
    <!-- macOS-style draggable title bar -->
    <div id="titlebar" style="--wails-draggable:drag">
        <div class="titlebar-left">
            <span class="app-logo">⏱</span>
            <span class="app-title">Clockify ↔ Jira</span>
        </div>
        <div class="titlebar-right">
            <button id="theme-toggle" class="icon-btn" title="Toggle theme">
                <span class="theme-icon">🌙</span>
            </button>
        </div>
    </div>

    <div id="app" class="unified-layout">
        <!-- Top Navigation Tabs -->
        <div class="top-nav-tabs">
            <button class="nav-tab active" data-target="timer-view">
                <span class="tab-icon">⏱</span> Timer
            </button>
            <button class="nav-tab" data-target="history-view">
                <span class="tab-icon">📋</span> History
            </button>
            <button class="nav-tab" data-target="settings-view">
                <span class="tab-icon">⚙️</span> Settings
            </button>
        </div>

        <div class="view-content">
            <!-- Timer/Manual View -->
            <div id="timer-view" class="main-view active">
                <div class="timer-section">
                    <!-- The actual Timer display -->
                    <div id="timer-display-container">
                        <div class="timer-display-huge" id="timer-display">00:00:00</div>
                        <div class="timer-status" id="timer-status-label" style="margin-bottom: 12px;">IDLE</div>
                    </div>

                    <!-- The Manual input fields (swaps with timer) -->
                    <div id="manual-display-container" class="hidden" style="margin-bottom: 12px; text-align: left;">
                        <div class="form-group" style="margin-bottom: 8px;">
                            <label class="form-label">Date</label>
                            <input type="date" id="manual-date" class="input input-dark input-sm" required />
                        </div>
                        <div class="row-between">
                            <div class="form-group" style="width: 48%;">
                                <label class="form-label">Start Time</label>
                                <input type="time" id="manual-start" class="input input-dark input-sm" required />
                            </div>
                            <div class="form-group" style="width: 48%;">
                                <label class="form-label">End Time</label>
                                <input type="time" id="manual-end" class="input input-dark input-sm" required />
                            </div>
                        </div>
                    </div>

                    <!-- Mode Toggle Buttons -->
                    <div class="timer-mode-toggle" style="display: flex; justify-content: center; gap: 8px;">
                        <button id="mode-timer-btn" class="btn btn-sm btn-secondary active" style="min-width: 80px;">⏱
                            Timer</button>
                        <button id="mode-manual-btn" class="btn btn-sm btn-ghost" style="min-width: 80px;">✏️
                            Manual</button>
                    </div>
                </div>

                <div class="separator-line"></div>

                <div class="form-section">
                    <div class="form-group">
                        <label class="form-label">Description</label>
                        <div class="search-container">
                            <input type="text" id="ticket-search" class="input input-dark"
                                placeholder="Type ticket key or description..." autocomplete="off" />
                            <div id="search-results" class="dropdown hidden"></div>
                        </div>
                    </div>

                    <div class="issues-summary row-between">
                        <span class="muted-text" id="assigned-count">Loading open issues...</span>
                        <a href="#" class="action-link" id="toggle-assigned-btn">❖ Show all my tickets</a>
                    </div>

                    <div id="assigned-tickets" class="dropdown hidden inline-dropdown">
                        <div id="assigned-list" class="ticket-items">
                            <div class="loading-spinner">Loading...</div>
                        </div>
                    </div>

                    <div id="selected-ticket" class="selected-ticket hidden">
                        <div class="ticket-info">
                            <span class="ticket-key" id="selected-key"></span>
                            <span class="ticket-summary" id="selected-summary"></span>
                        </div>
                        <button id="clear-ticket-btn" class="icon-btn btn-sm" title="Clear ticket">✕</button>
                        <span class="ticket-type hidden" id="selected-type"></span>
                        <span class="ticket-status hidden" id="selected-status"></span>
                    </div>

                    <div class="form-group margin-top-auto">
                        <label class="form-label">Project</label>
                        <select class="input input-dark select-input" id="project-select">
                            <option>— Default project —</option>
                        </select>
                    </div>

                    <button id="timer-start-btn" class="btn btn-huge btn-accent-fill" disabled>
                        <span class="btn-icon">▶</span> Start Tracking
                    </button>
                    <button id="timer-stop-btn" class="btn btn-huge btn-danger-fill hidden">
                        <span class="btn-icon">⏹</span> Stop Tracking
                    </button>
                    <button id="manual-submit-btn" class="btn btn-huge btn-accent-fill hidden" disabled>
                        ＋ Add Time Entry
                    </button>
                </div>
            </div>

            <!-- History View -->
            <div id="history-view" class="main-view hidden" style="display: none;">
                <div class="history-controls">
                    <input type="date" id="history-start" class="input input-dark input-xs" />
                    <span class="muted-text">→</span>
                    <input type="date" id="history-end" class="input input-dark input-xs" />
                    <button id="history-fetch-btn" class="icon-btn" title="Refresh">🔄</button>
                </div>
                <div class="separator-line" style="margin: 12px 0;"></div>
                <div id="history-list" class="history-items full-height-scroll">
                    <div class="empty-state">
                        <p class="muted-text">No entries found.</p>
                    </div>
                </div>
            </div>

            <!-- Settings View -->
            <div id="settings-view" class="main-view hidden" style="display: none;">
                <div class="form-section" style="gap: 16px;">
                    <div class="form-group">
                        <label class="form-label">Theme Appearance</label>
                        <button id="theme-toggle" class="btn btn-secondary btn-sm" style="width: fit-content;">
                            <span class="btn-icon">🎨</span> Toggle Light/Dark Mode
                        </button>
                    </div>

                    <div class="separator-line" style="margin: 8px 0;"></div>

                    <form id="settings-api-form" class="form-group" style="gap: 12px;">
                        <label class="form-label" style="font-weight: 600;">API Configurations</label>

                        <div class="form-group" style="gap: 4px;">
                            <label class="muted-text" style="font-size: 11px;">Clockify API Key</label>
                            <input type="password" id="setting-clockify-key" class="input input-dark input-sm"
                                placeholder="e.g. XYZA123..." />
                        </div>

                        <div class="form-group" style="gap: 4px;">
                            <label class="muted-text" style="font-size: 11px;">Clockify Workspace ID</label>
                            <input type="text" id="setting-clockify-ws" class="input input-dark input-sm"
                                placeholder="e.g. 60f1a..." />
                        </div>

                        <div class="form-group" style="gap: 4px; margin-top: 8px;">
                            <label class="muted-text" style="font-size: 11px;">Jira Base URL</label>
                            <input type="text" id="setting-jira-url" class="input input-dark input-sm"
                                placeholder="https://your-domain.atlassian.net" />
                        </div>

                        <div class="form-group" style="gap: 4px;">
                            <label class="muted-text" style="font-size: 11px;">Jira Email</label>
                            <input type="email" id="setting-jira-email" class="input input-dark input-sm"
                                placeholder="user@example.com" />
                        </div>

                        <div class="form-group" style="gap: 4px;">
                            <label class="muted-text" style="font-size: 11px;">Jira API Token</label>
                            <input type="password" id="setting-jira-token" class="input input-dark input-sm"
                                placeholder="Atlassian Personal Access Token" />
                        </div>

                        <button type="submit" class="btn btn-sm btn-accent-fill" style="margin-top: 8px;">Save
                            Settings</button>
                    </form>

                    <div class="separator-line" style="margin: 8px 0;"></div>

                    <div class="form-group">
                        <label class="form-label">Account Integrations</label>
                        <div class="row-between">
                            <span style="font-size: 13px;">Clockify</span>
                            <span class="ticket-status" id="status-clockify"
                                style="background: rgba(34, 197, 94, 0.15); color: var(--success); padding: 2px 8px; border-radius: 12px;">Connected</span>
                        </div>
                        <div class="row-between" style="margin-top: 8px;">
                            <span style="font-size: 13px;">Jira Software</span>
                            <span class="ticket-status" id="status-jira"
                                style="background: rgba(34, 197, 94, 0.15); color: var(--success); padding: 2px 8px; border-radius: 12px;">Connected</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="edit-modal" class="modal hidden">
        <div class="modal-backdrop"></div>
        <div class="modal-content">
            <h3 class="modal-title">Edit Time Entry</h3>
            <form id="edit-form" class="form">
                <input type="hidden" id="edit-id" />
                <div class="form-group">
                    <label class="label">Ticket Key</label>
                    <input type="text" id="edit-ticket" class="input" required />
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="label">Start</label>
                        <input type="datetime-local" id="edit-start" class="input" required />
                    </div>
                    <div class="form-group">
                        <label class="label">End</label>
                        <input type="datetime-local" id="edit-end" class="input" required />
                    </div>
                </div>
                <div class="form-group">
                    <label class="label">Description</label>
                    <input type="text" id="edit-description" class="input" />
                </div>
                <div class="modal-actions">
                    <button type="button" id="edit-cancel-btn" class="btn btn-ghost">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container"></div>

    
</body>

</html>
